<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blanc's Recipe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#FFFDF9] scroll-smooth overflow-x-hidden">

    <nav class="sticky top-0 z-[100] bg-white/80 backdrop-blur-md border-b-2 border-[#FFD1DC]/30 py-4 px-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="#" class="flex items-center gap-2">
                <div class="w-10 h-10 bg-[#FFD1DC] rounded-full flex items-center justify-center text-white">
                    <i data-lucide="rabbit" size="20"></i>
                </div>
                <h1 class="text-2xl font-display text-[#FF8DA1]">Blanc's Recipe</h1>
            </a>
            <div class="hidden md:flex gap-8 font-bold text-gray-600 items-center">
                <a href="#" class="hover:text-[#FF8DA1] transition-colors">Home</a>
                <a href="#about" class="hover:text-[#FF8DA1] transition-colors">Story</a>
                <a href="#shop" class="hover:text-[#FF8DA1] transition-colors">Shop</a>
                <a href="#faq" class="hover:text-[#FF8DA1] transition-colors">Q&A</a>
                <a href="#contact" class="hover:text-[#FF8DA1] transition-colors">Contact</a>
                <button class="cart-trigger p-2 text-gray-600 hover:text-[#FF8DA1] relative outline-none">
                    <i data-lucide="shopping-cart"></i>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-[#FF8DA1] text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center hidden">0</span>
                </button>
            </div>
            <div class="flex md:hidden items-center gap-4">
                <button class="cart-trigger p-2 text-gray-600 relative outline-none">
                    <i data-lucide="shopping-cart"></i>
                    <span id="cart-count-mobile" class="absolute -top-1 -right-1 bg-[#FF8DA1] text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center hidden">0</span>
                </button>
                <button id="menu-open" class="p-2 text-gray-600"><i data-lucide="menu"></i></button>
            </div>
        </div>
    </nav>

    <div id="mobile-menu" class="fixed inset-0 z-[200] bg-[#FFFDF9] translate-x-full transition-transform duration-300 md:hidden flex flex-col p-6">
        <div class="flex justify-end"><button id="menu-close" class="p-2"><i data-lucide="x" size="32"></i></button></div>
        <div class="flex flex-col items-center gap-10 mt-16 font-bold text-2xl text-gray-600">
            <a href="#" class="mobile-link">Home</a>
            <a href="#about" class="mobile-link">Story</a>
            <a href="#shop" class="mobile-link">Shop</a>
            <a href="#contact" class="mobile-link">Contact</a>
        </div>
    </div>

    <header class="py-12 md:py-20 text-center px-4">
        <h2 class="text-5xl md:text-8xl font-display text-[#FF8DA1] mb-4">Blanc's Recipe</h2>
        <p class="text-lg md:text-2xl font-bold text-[#5F9EA0] tracking-[0.2em] mb-12">ブランのレシピ店</p>
        <div class="flex flex-col md:flex-row justify-center items-center gap-4 px-6">
            <a href="#about" class="w-full md:w-auto min-w-[220px] bg-white border-2 border-[#5F9EA0] text-[#5F9EA0] px-8 py-4 rounded-full font-bold hover:bg-[#F4FBFB] transition-all flex items-center justify-center gap-2">
                <i data-lucide="book-open" size="20"></i> ストーリーを見る
            </a>
            <a href="#shop" class="w-full md:w-auto min-w-[220px] bg-[#FF8DA1] text-white px-8 py-4 rounded-full font-bold hover:bg-[#ff758f] shadow-lg transition-all flex items-center justify-center gap-2">
                <i data-lucide="sparkles" size="20"></i> お菓子をみる
            </a>
        </div>
    </header>

    <div class="px-6 max-w-4xl mx-auto my-12">
        <div id="blanc-message-container" class="bg-white/60 backdrop-blur-sm p-6 md:p-8 rounded-[2.5rem] border-2 border-dashed border-[#FFD1DC] text-center shadow-sm">
            <p id="blanc-message" class="text-gray-600 italic md:text-xl font-medium leading-relaxed">読み込み中...</p>
        </div>
    </div>

    <section id="shop" class="py-24 px-4 bg-white/40">
        <div class="max-w-7xl mx-auto">
            <h3 class="text-4xl font-display text-center text-[#FF8DA1] mb-16">Daily Specials</h3>
            <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 md:gap-12"></div>
        </div>
    </section>

    <div id="modal" class="fixed inset-0 z-[150] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" id="modal-overlay"></div>
        <div class="relative w-full max-w-4xl bg-[#FFFDF9] rounded-[3rem] overflow-hidden shadow-2xl flex flex-col md:flex-row max-h-[90vh] overflow-y-auto md:overflow-hidden">
            <button id="modal-close" class="absolute top-6 right-6 z-20 p-2 bg-white rounded-full"><i data-lucide="x"></i></button>
            <div id="modal-icon" class="w-full md:w-1/2 bg-[#B0E0E6]/10 flex items-center justify-center p-12 text-[#5F9EA0]"></div>
            <div class="p-8 md:p-14 flex flex-col flex-1">
                <div id="modal-info" class="text-[10px] font-bold text-[#5F9EA0] mb-2 tracking-widest uppercase"></div>
                <h2 id="modal-title" class="text-3xl font-bold text-[#FF8DA1] mb-2"></h2>
                <p id="modal-price" class="text-2xl font-display text-[#5F9EA0] mb-6"></p>
                <p id="modal-story" class="italic text-gray-600 mb-4"></p>
                <p id="modal-description" class="text-sm text-gray-500 mb-8"></p>
                
                <div id="modal-allergy" class="text-[10px] text-gray-400 mb-8"></div>
                
                <button id="add-to-cart-btn" class="w-full py-4 bg-[#FF8DA1] text-white rounded-full font-bold shadow-md">カートに入れる</button>
            </div>
        </div>
    </div

    <script src="script.js"></script>
</body>
</html>
